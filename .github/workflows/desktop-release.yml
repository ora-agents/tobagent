name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (for example, v0.1.0)'
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      channel: ${{ steps.channel.outputs.channel }}
      prerelease: ${{ steps.channel.outputs.prerelease }}
    steps:
      - name: Validate release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must be a semantic version prefixed with v, for example v0.1.0 or v0.1.0-beta.1." >&2
            exit 1
          fi

          echo "app_version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Detect release channel
        id: channel
        shell: bash
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          if [[ "$tag" == *"-alpha."* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "channel=Alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$tag" == *"-beta."* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "channel=Beta" >> "$GITHUB_OUTPUT"
          elif [[ "$tag" == *"-rc."* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "channel=RC" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "channel=Stable" >> "$GITHUB_OUTPUT"
          fi

  create-release:
    name: Create release
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TITLE: TOB Agent ${{ env.RELEASE_TAG }} [${{ needs.prepare.outputs.channel }}]
          RELEASE_NOTES: |
            Desktop release for Linux, Windows, and macOS.
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES" \
              --draft=false \
              --prerelease="$PRERELEASE"
          else
            create_args=(
              --verify-tag
              --title "$RELEASE_TITLE"
              --notes "$RELEASE_NOTES"
            )
            if [[ "$PRERELEASE" == "true" ]]; then
              create_args+=(--prerelease)
            fi
            gh release create "$RELEASE_TAG" "${create_args[@]}"
          fi

  build:
    name: Build ${{ matrix.platform_name }}
    needs:
      - prepare
      - create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_name: Linux
            runner: ubuntu-22.04
            bundle_targets: '["deb","rpm"]'
          - platform_name: Windows
            runner: windows-latest
            bundle_targets: '["nsis","msi"]'
          - platform_name: macOS
            runner: macos-latest
            bundle_targets: '["dmg"]'

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Install Linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Sync desktop app version
        shell: bash
        env:
          APP_VERSION: ${{ needs.prepare.outputs.app_version }}
          BUNDLE_TARGETS: ${{ matrix.bundle_targets }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("fs")

          const version = process.env.APP_VERSION
          const packageFile = "frontend/package.json"
          const packageJson = JSON.parse(fs.readFileSync(packageFile, "utf8"))
          packageJson.version = version
          fs.writeFileSync(packageFile, `${JSON.stringify(packageJson, null, 2)}\n`)

          const tauriFile = "frontend/src-tauri/tauri.conf.json"
          const tauriConfig = JSON.parse(fs.readFileSync(tauriFile, "utf8"))
          tauriConfig.version = version
          tauriConfig.bundle = tauriConfig.bundle || {}
          tauriConfig.bundle.targets = JSON.parse(process.env.BUNDLE_TARGETS)
          fs.writeFileSync(tauriFile, `${JSON.stringify(tauriConfig, null, 2)}\n`)

          const cargoFile = "frontend/src-tauri/Cargo.toml"
          const cargo = fs.readFileSync(cargoFile, "utf8")
          fs.writeFileSync(
            cargoFile,
            cargo.replace(/^version = ".*"$/m, `version = "${version}"`),
          )
          NODE

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: TOB Agent ${{ env.RELEASE_TAG }} [${{ needs.prepare.outputs.channel }}]
          releaseBody: |
            Desktop release for Linux, Windows, and macOS.
          releaseDraft: false
          prerelease: ${{ needs.prepare.outputs.prerelease }}

  build-backend:
    name: Build backend ${{ matrix.platform_name }}
    needs:
      - prepare
      - create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_name: Linux x64
            runner: ubuntu-22.04
            asset_os: linux
            archive_format: tar.gz
            binary_name: tobagent-backend
          - platform_name: Windows x64
            runner: windows-latest
            asset_os: windows
            archive_format: zip
            binary_name: tobagent-backend.exe
          - platform_name: macOS
            runner: macos-latest
            asset_os: macos
            archive_format: tar.gz
            binary_name: tobagent-backend

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install Linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf

      - name: Install backend dependencies
        run: uv sync --frozen --group dev

      - name: Build backend binary
        run: uv run python scripts/build_desktop_backend.py

      - name: Package backend asset
        id: package
        shell: bash
        env:
          APP_VERSION: ${{ needs.prepare.outputs.app_version }}
          ASSET_OS: ${{ matrix.asset_os }}
          ARCHIVE_FORMAT: ${{ matrix.archive_format }}
          BINARY_NAME: ${{ matrix.binary_name }}
        run: |
          set -euo pipefail

          python <<'PY'
          import hashlib
          import os
          import shutil
          import tarfile
          import zipfile
          from pathlib import Path
          from platform import machine

          version = os.environ["APP_VERSION"]
          asset_os = os.environ["ASSET_OS"]
          archive_format = os.environ["ARCHIVE_FORMAT"]
          binary_name = os.environ["BINARY_NAME"]

          raw_arch = machine().lower()
          arch = {
              "amd64": "x64",
              "x86_64": "x64",
              "aarch64": "arm64",
              "arm64": "arm64",
          }.get(raw_arch, raw_arch.replace(" ", "-"))
          asset_name = f"tobagent-backend-{asset_os}-{arch}.{archive_format}"

          root = Path.cwd()
          dist = root / "desktop" / "dist"
          package_dir = dist / "package-root"
          out_dir = dist / "release-assets"
          binary = dist / "bin" / binary_name

          if not binary.exists():
              raise FileNotFoundError(f"Backend binary was not found: {binary}")

          if package_dir.exists():
              shutil.rmtree(package_dir)
          out_dir.mkdir(parents=True, exist_ok=True)
          (package_dir / "bin").mkdir(parents=True)

          shutil.copy2(binary, package_dir / "bin" / binary_name)
          resources = dist / "resources"
          if resources.exists():
              shutil.copytree(resources, package_dir / "resources")
          (package_dir / "VERSION").write_text(f"{version}\n", encoding="utf-8")

          asset = out_dir / asset_name
          if asset.exists():
              asset.unlink()

          if archive_format == "zip":
              with zipfile.ZipFile(asset, "w", compression=zipfile.ZIP_DEFLATED) as archive:
                  for path in sorted(package_dir.rglob("*")):
                      if path.is_file():
                          archive.write(path, path.relative_to(package_dir).as_posix())
          else:
              with tarfile.open(asset, "w:gz") as archive:
                  for path in sorted(package_dir.rglob("*")):
                      archive.add(path, path.relative_to(package_dir).as_posix())

          digest = hashlib.sha256(asset.read_bytes()).hexdigest()
          checksum = out_dir / f"{asset_name}.sha256"
          checksum.write_text(f"{digest}  {asset_name}\n", encoding="utf-8")

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"asset_name={asset_name}\n")
          PY

      - name: Upload backend release asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET_NAME: ${{ steps.package.outputs.asset_name }}
        run: |
          set -euo pipefail

          gh release upload "$RELEASE_TAG" \
            "desktop/dist/release-assets/$ASSET_NAME" \
            "desktop/dist/release-assets/$ASSET_NAME.sha256" \
            --clobber
