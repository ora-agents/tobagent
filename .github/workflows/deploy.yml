name: Build and deploy

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'backend-v*'
      - 'frontend-v*'
      - 'speaker-v*'
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'aegra.json'
      - 'langgraph.json'
      - 'assets/**'
      - 'frontend/**'
      - 'services/speaker/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/desktop-release.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      speaker: ${{ steps.filter.outputs.speaker }}
      desktop: ${{ steps.filter.outputs.desktop }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'src/**'
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'aegra.json'
              - 'langgraph.json'
              - 'assets/**'
            frontend:
              - 'frontend/**'
            desktop:
              - 'frontend/**'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/desktop-release.yml'
            speaker:
              - 'services/speaker/**'
            compose:
              - 'docker-compose.yml'

  release:
    name: Create service version tags
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') }}
    outputs:
      backend_tag: ${{ steps.version.outputs.backend_tag }}
      frontend_tag: ${{ steps.version.outputs.frontend_tag }}
      speaker_tag: ${{ steps.version.outputs.speaker_tag }}
      desktop_tag: ${{ steps.version.outputs.desktop_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create release tags
        id: version
        shell: bash
        env:
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend }}
          SPEAKER_CHANGED: ${{ needs.changes.outputs.speaker }}
          DESKTOP_CHANGED: ${{ needs.changes.outputs.desktop }}
        run: |
          set -euo pipefail

          touches_service() {
            local service="$1"
            local commit="$2"

            case "$service" in
              backend)
                git diff-tree --no-commit-id --name-only -r "$commit" | grep -Eq '^(src/|Dockerfile$|pyproject[.]toml$|uv[.]lock$|aegra[.]json$|langgraph[.]json$|assets/)'
                ;;
              frontend)
                git diff-tree --no-commit-id --name-only -r "$commit" | grep -Eq '^frontend/'
                ;;
              speaker)
                git diff-tree --no-commit-id --name-only -r "$commit" | grep -Eq '^services/speaker/'
                ;;
            esac
          }

          commit_bump() {
            local commit="$1"
            local message subject
            message="$(git log -1 --format=%B "$commit")"
            subject="$(git log -1 --format=%s "$commit")"

            if grep -Eq '^BREAKING[ -]CHANGE:' <<<"$message" || grep -Eq '^[A-Za-z]+(\([^)]+\))?!:' <<<"$subject"; then
              printf 'major'
            elif grep -Eq '^feat(\([^)]+\))?:' <<<"$subject"; then
              printf 'minor'
            else
              printf 'patch'
            fi
          }

          max_bump() {
            local current="$1"
            local candidate="$2"

            if [[ "$current" == major || "$candidate" == major ]]; then
              printf 'major'
            elif [[ "$current" == minor || "$candidate" == minor ]]; then
              printf 'minor'
            else
              printf 'patch'
            fi
          }

          next_version() {
            local version="$1"
            local bump="$2"
            local major minor patch

            IFS=. read -r major minor patch <<<"$version"

            case "$bump" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
            esac

            printf '%s.%s.%s' "$major" "$minor" "$patch"
          }

          latest_service_tag() {
            local service="$1"

            git tag -l "${service}-v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | head -n 1
          }

          latest_desktop_tag() {
            git tag -l "v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | head -n 1
          }

          create_service_tag() {
            local service="$1"
            local changed="$2"

            if [[ "$changed" != true ]]; then
              return
            fi

            local latest_tag base_version range bump commit candidate version tag existing
            latest_tag="$(latest_service_tag "$service")"
            base_version="${latest_tag#"${service}"-v}"

            if [[ -n "$latest_tag" ]]; then
              range="${latest_tag}..HEAD"
            else
              base_version="0.0.0"
              range="HEAD"
            fi

            bump=""
            while IFS= read -r commit; do
              if touches_service "$service" "$commit"; then
                candidate="$(commit_bump "$commit")"
                if [[ -z "$bump" ]]; then
                  bump="$candidate"
                else
                  bump="$(max_bump "$bump" "$candidate")"
                fi
              fi
            done < <(git rev-list --reverse "$range")

            if [[ -z "$bump" ]]; then
              return
            fi

            version="$(next_version "$base_version" "$bump")"
            tag="${service}-v${version}"

            if existing="$(git rev-parse -q --verify "refs/tags/${tag}")"; then
              if [[ "$existing" != "$(git rev-parse HEAD)" ]]; then
                echo "Tag ${tag} already exists at ${existing}, not HEAD." >&2
                exit 1
              fi
            else
              git tag "$tag" HEAD
              git push origin "$tag"
            fi

            echo "${service}_tag=${tag}" >> "$GITHUB_OUTPUT"
          }

          create_service_tag backend "$BACKEND_CHANGED"
          create_service_tag frontend "$FRONTEND_CHANGED"
          create_service_tag speaker "$SPEAKER_CHANGED"

          create_desktop_tag() {
            local changed="$1"

            if [[ "$changed" != true ]]; then
              return
            fi

            local latest_tag base_version range bump commit candidate version tag existing
            latest_tag="$(latest_desktop_tag)"

            if [[ -n "$latest_tag" ]]; then
              base_version="${latest_tag#v}"
              range="${latest_tag}..HEAD"

              bump=""
              while IFS= read -r commit; do
                if touches_service frontend "$commit"; then
                  candidate="$(commit_bump "$commit")"
                  if [[ -z "$bump" ]]; then
                    bump="$candidate"
                  else
                    bump="$(max_bump "$bump" "$candidate")"
                  fi
                fi
              done < <(git rev-list --reverse "$range")

              if [[ -z "$bump" ]]; then
                bump="patch"
              fi

              version="$(next_version "$base_version" "$bump")"
            else
              version="$(node -p "require('./frontend/src-tauri/tauri.conf.json').version || require('./frontend/package.json').version || '0.1.0'")"
            fi

            tag="v${version}"

            if existing="$(git rev-parse -q --verify "refs/tags/${tag}")"; then
              if [[ "$existing" != "$(git rev-parse HEAD)" ]]; then
                echo "Tag ${tag} already exists at ${existing}, not HEAD." >&2
                exit 1
              fi
            else
              git tag "$tag" HEAD
              git push origin "$tag"
            fi

            echo "desktop_tag=${tag}" >> "$GITHUB_OUTPUT"
          }

          create_desktop_tag "$DESKTOP_CHANGED"

  desktop-release:
    name: Trigger desktop release
    runs-on: ubuntu-latest
    needs:
      - changes
      - release
    if: ${{ always() && needs.release.result == 'success' && needs.release.outputs.desktop_tag != '' }}
    steps:
      - name: Trigger Desktop Release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DESKTOP_TAG: ${{ needs.release.outputs.desktop_tag }}
        run: gh workflow run desktop-release.yml --ref "$GITHUB_REF_NAME" -f tag="$DESKTOP_TAG"

  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs:
      - changes
      - release
    if: ${{ always() && (needs.release.result == 'success' || needs.release.result == 'skipped') && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' || startsWith(github.ref_name, 'backend-v')) }}
    outputs:
      api_image: ${{ steps.images.outputs.api_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: images
        shell: bash
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          release_tag="${{ needs.release.outputs.backend_tag }}"
          if [[ "$GITHUB_REF_NAME" == backend-v* ]]; then
            api_image="${repo}/api:${GITHUB_REF_NAME#backend-}"
            {
              echo "api_image=${api_image}"
              echo "api_tags<<EOF"
              echo "${api_image}"
              echo "${repo}/api:${GITHUB_SHA}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          elif [[ -n "$release_tag" ]]; then
            api_image="${repo}/api:${release_tag#backend-}"
            {
              echo "api_image=${api_image}"
              echo "api_tags<<EOF"
              echo "${api_image}"
              echo "${repo}/api:${GITHUB_SHA}"
              echo "${repo}/api:main"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            api_image="${repo}/api:${GITHUB_SHA}"
            {
              echo "api_image=${api_image}"
              echo "api_tags<<EOF"
              echo "${api_image}"
              echo "${repo}/api:main"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Free runner disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.images.outputs.api_tags }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max,ignore-error=true

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs:
      - changes
      - release
    if: ${{ always() && (needs.release.result == 'success' || needs.release.result == 'skipped') && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' || startsWith(github.ref_name, 'frontend-v')) }}
    outputs:
      frontend_image: ${{ steps.images.outputs.frontend_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: images
        shell: bash
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          release_tag="${{ needs.release.outputs.frontend_tag }}"
          if [[ "$GITHUB_REF_NAME" == frontend-v* ]]; then
            frontend_image="${repo}/frontend:${GITHUB_REF_NAME#frontend-}"
            {
              echo "frontend_image=${frontend_image}"
              echo "frontend_tags<<EOF"
              echo "${frontend_image}"
              echo "${repo}/frontend:${GITHUB_SHA}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          elif [[ -n "$release_tag" ]]; then
            frontend_image="${repo}/frontend:${release_tag#frontend-}"
            {
              echo "frontend_image=${frontend_image}"
              echo "frontend_tags<<EOF"
              echo "${frontend_image}"
              echo "${repo}/frontend:${GITHUB_SHA}"
              echo "${repo}/frontend:main"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            frontend_image="${repo}/frontend:${GITHUB_SHA}"
            {
              echo "frontend_image=${frontend_image}"
              echo "frontend_tags<<EOF"
              echo "${frontend_image}"
              echo "${repo}/frontend:main"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Free runner disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.images.outputs.frontend_tags }}
          build-args: |
            NEXT_PUBLIC_OPENAI_DEFAULT_MODEL=${{ vars.NEXT_PUBLIC_OPENAI_DEFAULT_MODEL || 'qwen3.6-flash' }}
            NEXT_PUBLIC_LANGGRAPH_API_URL=${{ vars.NEXT_PUBLIC_LANGGRAPH_API_URL || 'https://gen.wsiri.cn' }}
            NEXT_PUBLIC_SHOW_MIC_DEVICE_DEBUG=${{ vars.NEXT_PUBLIC_SHOW_MIC_DEVICE_DEBUG }}
            NEXT_PUBLIC_ADMIN_URL=${{ vars.NEXT_PUBLIC_ADMIN_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max,ignore-error=true

  build-speaker:
    name: Build speaker image
    runs-on: ubuntu-latest
    needs:
      - changes
      - release
    if: ${{ always() && (needs.release.result == 'success' || needs.release.result == 'skipped') && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.speaker == 'true' || startsWith(github.ref_name, 'speaker-v')) }}
    outputs:
      speaker_image: ${{ steps.images.outputs.speaker_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: images
        shell: bash
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          release_tag="${{ needs.release.outputs.speaker_tag }}"
          if [[ "$GITHUB_REF_NAME" == speaker-v* ]]; then
            speaker_image="${repo}/speaker:${GITHUB_REF_NAME#speaker-}"
            {
              echo "speaker_image=${speaker_image}"
              echo "speaker_tags<<EOF"
              echo "${speaker_image}"
              echo "${repo}/speaker:${GITHUB_SHA}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          elif [[ -n "$release_tag" ]]; then
            speaker_image="${repo}/speaker:${release_tag#speaker-}"
            {
              echo "speaker_image=${speaker_image}"
              echo "speaker_tags<<EOF"
              echo "${speaker_image}"
              echo "${repo}/speaker:${GITHUB_SHA}"
              echo "${repo}/speaker:main"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            speaker_image="${repo}/speaker:${GITHUB_SHA}"
            {
              echo "speaker_image=${speaker_image}"
              echo "speaker_tags<<EOF"
              echo "${speaker_image}"
              echo "${repo}/speaker:main"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Free runner disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push speaker image
        uses: docker/build-push-action@v6
        with:
          context: ./services/speaker
          file: ./services/speaker/Dockerfile
          push: true
          tags: ${{ steps.images.outputs.speaker_tags }}
          cache-from: type=gha,scope=speaker
          cache-to: type=gha,scope=speaker,mode=max,ignore-error=true

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs:
      - changes
      - release
      - build-backend
      - build-frontend
      - build-speaker
    if: ${{ always() && (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') && (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') && (needs.build-speaker.result == 'success' || needs.build-speaker.result == 'skipped') && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success' || needs.build-speaker.result == 'success' || needs.changes.outputs.compose == 'true') }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key

      - name: Sync compose file
        shell: bash
        run: |
          SSH_OPTS=(-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null)
          ssh "${SSH_OPTS[@]}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}'"
          scp "${SSH_OPTS[@]}" docker-compose.yml \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/docker-compose.yml"

      - name: Restart services
        shell: bash
        env:
          API_IMAGE: ${{ needs.build-backend.outputs.api_image }}
          FRONTEND_IMAGE: ${{ needs.build-frontend.outputs.frontend_image }}
          SPEAKER_IMAGE: ${{ needs.build-speaker.outputs.speaker_image }}
          REPOSITORY: ${{ github.repository }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          repo="ghcr.io/${REPOSITORY,,}"
          SSH_OPTS=(-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null)
          {
            printf 'export DEPLOY_PATH=%q\n' "$DEPLOY_PATH"
            printf 'export API_IMAGE=%q\n' "$API_IMAGE"
            printf 'export FRONTEND_IMAGE=%q\n' "$FRONTEND_IMAGE"
            printf 'export SPEAKER_IMAGE=%q\n' "$SPEAKER_IMAGE"
            printf 'export DEFAULT_API_IMAGE=%q\n' "${repo}/api:main"
            printf 'export DEFAULT_FRONTEND_IMAGE=%q\n' "${repo}/frontend:main"
            printf 'export DEFAULT_SPEAKER_IMAGE=%q\n' "${repo}/speaker:main"
            printf 'export GHCR_USERNAME=%q\n' "$GHCR_USERNAME"
            printf 'export GHCR_TOKEN=%q\n' "$GHCR_TOKEN"
            cat <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          current_image() {
            docker inspect --format '{{.Config.Image}}' "$1" 2>/dev/null || true
          }

          dump_deploy_diagnostics() {
            echo "::group::Disk usage"
            df -h /
            docker system df || true
            echo "::endgroup::"
            echo "::group::Docker compose status"
            docker compose ps || true
            echo "::endgroup::"
            echo "::group::tobagent-api logs"
            docker logs --tail=200 tobagent-api || true
            echo "::endgroup::"
            echo "::group::speaker logs"
            docker logs --tail=120 tobagent-speaker || true
            echo "::endgroup::"
          }
          trap dump_deploy_diagnostics ERR

          if [ ! -s models/vad/ten-vad.onnx ]; then
            echo "Missing required VAD model: $DEPLOY_PATH/models/vad/ten-vad.onnx" >&2
            echo "Upload it once, for example: scp models/vad/ten-vad.onnx $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/models/vad/ten-vad.onnx" >&2
            exit 1
          fi

          kws_model_dir="models/kws/sherpa-onnx-kws-zipformer-zh-en-3M-2025-12-20"
          if [ ! -s "$kws_model_dir/tokens.txt" ] || [ ! -s "$kws_model_dir/encoder-epoch-13-avg-2-chunk-16-left-64.int8.onnx" ]; then
            echo "Missing required KWS model under $DEPLOY_PATH/$kws_model_dir" >&2
            echo "Upload it once, for example: scp -r models/kws $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/models/kws" >&2
            exit 1
          fi

          if [ -n "$GHCR_TOKEN" ]; then
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi

          api_image="${API_IMAGE:-$(current_image tobagent-api)}"
          frontend_image="${FRONTEND_IMAGE:-$(current_image tobagent-frontend)}"
          speaker_image="${SPEAKER_IMAGE:-$(current_image tobagent-speaker)}"
          api_image="${api_image:-$DEFAULT_API_IMAGE}"
          frontend_image="${frontend_image:-$DEFAULT_FRONTEND_IMAGE}"
          speaker_image="${speaker_image:-$DEFAULT_SPEAKER_IMAGE}"

          if [ -z "$api_image" ] || [ -z "$frontend_image" ] || [ -z "$speaker_image" ]; then
            echo "Cannot deploy because at least one skipped service has no running image to reuse." >&2
            echo "Run the workflow manually once to build all service images." >&2
            exit 1
          fi

          export TOBAGENT_IMAGE="$api_image"
          export TOBAGENT_FRONTEND_IMAGE="$frontend_image"
          export TOBAGENT_SPEAKER_IMAGE="$speaker_image"

          mkdir -p models/speechbrain

          min_free_kb=$((8 * 1024 * 1024))
          available_kb="$(df -Pk / | awk 'NR == 2 {print $4}')"
          if [ "$available_kb" -lt "$min_free_kb" ]; then
            echo "Less than 8 GiB is available; pruning unused Docker images before pulling."
            docker image prune -af
          fi

          df -h /
          docker compose pull tobagent frontend speaker
          docker compose up -d --remove-orphans
          docker image prune -af
          df -h /
          EOF
          } | ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s
