name: Build and deploy

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      speaker: ${{ steps.filter.outputs.speaker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            speaker:
              - 'services/speaker/**'
              - '.github/workflows/deploy.yml'
              - 'docker-compose.yml'

  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.images.outputs.api_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: images
        shell: bash
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "api_image=${repo}/api:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Free runner disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.images.outputs.api_image }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    outputs:
      frontend_image: ${{ steps.images.outputs.frontend_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: images
        shell: bash
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "frontend_image=${repo}/frontend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Free runner disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.images.outputs.frontend_image }}
          build-args: |
            NEXT_PUBLIC_OPENAI_DEFAULT_MODEL=${{ vars.NEXT_PUBLIC_OPENAI_DEFAULT_MODEL || 'qwen3.6-flash' }}
            NEXT_PUBLIC_LANGGRAPH_API_URL=${{ vars.NEXT_PUBLIC_LANGGRAPH_API_URL || 'https://gen.wsiri.cn' }}
            NEXT_PUBLIC_SHOW_MIC_DEVICE_DEBUG=${{ vars.NEXT_PUBLIC_SHOW_MIC_DEVICE_DEBUG }}
            NEXT_PUBLIC_ADMIN_URL=${{ vars.NEXT_PUBLIC_ADMIN_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  build-speaker:
    name: Build speaker image
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.speaker == 'true' }}
    outputs:
      speaker_image: ${{ steps.images.outputs.speaker_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: images
        shell: bash
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "speaker_image=${repo}/speaker:main" >> "$GITHUB_OUTPUT"
          echo "speaker_sha_image=${repo}/speaker:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Free runner disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push speaker image
        uses: docker/build-push-action@v6
        with:
          context: ./services/speaker
          file: ./services/speaker/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.speaker_image }}
            ${{ steps.images.outputs.speaker_sha_image }}
          cache-from: type=gha,scope=speaker
          cache-to: type=gha,scope=speaker,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-frontend
      - build-speaker
    if: ${{ always() && needs.build-backend.result == 'success' && needs.build-frontend.result == 'success' && (needs.build-speaker.result == 'success' || needs.build-speaker.result == 'skipped') }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key

      - name: Sync compose file
        shell: bash
        run: |
          SSH_OPTS=(-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null)
          ssh "${SSH_OPTS[@]}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}'"
          scp "${SSH_OPTS[@]}" docker-compose.yml \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/docker-compose.yml"

      - name: Restart services
        shell: bash
        env:
          API_IMAGE: ${{ needs.build-backend.outputs.api_image }}
          FRONTEND_IMAGE: ${{ needs.build-frontend.outputs.frontend_image }}
          SPEAKER_IMAGE: ${{ needs.build-speaker.outputs.speaker_image }}
          REPOSITORY: ${{ github.repository }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          repo="ghcr.io/${REPOSITORY,,}"
          speaker_image="${SPEAKER_IMAGE:-${repo}/speaker:main}"
          SSH_OPTS=(-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null)
          {
            printf 'export DEPLOY_PATH=%q\n' "$DEPLOY_PATH"
            printf 'export API_IMAGE=%q\n' "$API_IMAGE"
            printf 'export FRONTEND_IMAGE=%q\n' "$FRONTEND_IMAGE"
            printf 'export SPEAKER_IMAGE=%q\n' "$speaker_image"
            printf 'export GHCR_USERNAME=%q\n' "$GHCR_USERNAME"
            printf 'export GHCR_TOKEN=%q\n' "$GHCR_TOKEN"
            cat <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          dump_deploy_diagnostics() {
            echo "::group::Docker compose status"
            docker compose ps || true
            echo "::endgroup::"
            echo "::group::tobagent-api logs"
            docker logs --tail=200 tobagent-api || true
            echo "::endgroup::"
            echo "::group::speaker logs"
            docker logs --tail=120 tobagent-speaker || true
            echo "::endgroup::"
          }
          trap dump_deploy_diagnostics ERR

          if [ ! -s models/vad/ten-vad.onnx ]; then
            echo "Missing required VAD model: $DEPLOY_PATH/models/vad/ten-vad.onnx" >&2
            echo "Upload it once, for example: scp models/vad/ten-vad.onnx $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/models/vad/ten-vad.onnx" >&2
            exit 1
          fi

          if [ -n "$GHCR_TOKEN" ]; then
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi

          export TOBAGENT_IMAGE="$API_IMAGE"
          export TOBAGENT_FRONTEND_IMAGE="$FRONTEND_IMAGE"
          export TOBAGENT_SPEAKER_IMAGE="$SPEAKER_IMAGE"

          mkdir -p models/speechbrain
          docker compose pull tobagent frontend speaker
          docker compose up -d --remove-orphans
          docker image prune -f
          EOF
          } | ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s
