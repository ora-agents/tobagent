name: Build and deploy

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'backend-v*'
      - 'frontend-v*'
      - 'speaker-v*'
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'aegra.json'
      - 'langgraph.json'
      - 'assets/**'
      - 'frontend/**'
      - 'services/speaker/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      speaker: ${{ steps.filter.outputs.speaker }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'src/**'
              - 'Dockerfile'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'aegra.json'
              - 'langgraph.json'
              - 'assets/**'
            frontend:
              - 'frontend/**'
            speaker:
              - 'services/speaker/**'
            compose:
              - 'docker-compose.yml'

  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' || startsWith(github.ref_name, 'backend-v') }}
    outputs:
      api_image: ${{ steps.images.outputs.api_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: images
        shell: bash
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [[ "$GITHUB_REF_NAME" == backend-v* ]]; then
            api_image="${repo}/api:${GITHUB_REF_NAME#backend-}"
            {
              echo "api_image=${api_image}"
              echo "api_tags<<EOF"
              echo "${api_image}"
              echo "${repo}/api:${GITHUB_SHA}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            api_image="${repo}/api:${GITHUB_SHA}"
            {
              echo "api_image=${api_image}"
              echo "api_tags<<EOF"
              echo "${api_image}"
              echo "${repo}/api:main"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Free runner disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.images.outputs.api_tags }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true' || startsWith(github.ref_name, 'frontend-v') }}
    outputs:
      frontend_image: ${{ steps.images.outputs.frontend_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: images
        shell: bash
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [[ "$GITHUB_REF_NAME" == frontend-v* ]]; then
            frontend_image="${repo}/frontend:${GITHUB_REF_NAME#frontend-}"
            {
              echo "frontend_image=${frontend_image}"
              echo "frontend_tags<<EOF"
              echo "${frontend_image}"
              echo "${repo}/frontend:${GITHUB_SHA}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            frontend_image="${repo}/frontend:${GITHUB_SHA}"
            {
              echo "frontend_image=${frontend_image}"
              echo "frontend_tags<<EOF"
              echo "${frontend_image}"
              echo "${repo}/frontend:main"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Free runner disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.images.outputs.frontend_tags }}
          build-args: |
            NEXT_PUBLIC_OPENAI_DEFAULT_MODEL=${{ vars.NEXT_PUBLIC_OPENAI_DEFAULT_MODEL || 'qwen3.6-flash' }}
            NEXT_PUBLIC_LANGGRAPH_API_URL=${{ vars.NEXT_PUBLIC_LANGGRAPH_API_URL || 'https://gen.wsiri.cn' }}
            NEXT_PUBLIC_SHOW_MIC_DEVICE_DEBUG=${{ vars.NEXT_PUBLIC_SHOW_MIC_DEVICE_DEBUG }}
            NEXT_PUBLIC_ADMIN_URL=${{ vars.NEXT_PUBLIC_ADMIN_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  build-speaker:
    name: Build speaker image
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.speaker == 'true' || startsWith(github.ref_name, 'speaker-v') }}
    outputs:
      speaker_image: ${{ steps.images.outputs.speaker_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: images
        shell: bash
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [[ "$GITHUB_REF_NAME" == speaker-v* ]]; then
            speaker_image="${repo}/speaker:${GITHUB_REF_NAME#speaker-}"
            {
              echo "speaker_image=${speaker_image}"
              echo "speaker_tags<<EOF"
              echo "${speaker_image}"
              echo "${repo}/speaker:${GITHUB_SHA}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            speaker_image="${repo}/speaker:${GITHUB_SHA}"
            {
              echo "speaker_image=${speaker_image}"
              echo "speaker_tags<<EOF"
              echo "${speaker_image}"
              echo "${repo}/speaker:main"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Free runner disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push speaker image
        uses: docker/build-push-action@v6
        with:
          context: ./services/speaker
          file: ./services/speaker/Dockerfile
          push: true
          tags: ${{ steps.images.outputs.speaker_tags }}
          cache-from: type=gha,scope=speaker
          cache-to: type=gha,scope=speaker,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-backend
      - build-frontend
      - build-speaker
    if: ${{ always() && (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') && (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') && (needs.build-speaker.result == 'success' || needs.build-speaker.result == 'skipped') && (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success' || needs.build-speaker.result == 'success' || needs.changes.outputs.compose == 'true') }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key

      - name: Sync compose file
        shell: bash
        run: |
          SSH_OPTS=(-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null)
          ssh "${SSH_OPTS[@]}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}'"
          scp "${SSH_OPTS[@]}" docker-compose.yml \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/docker-compose.yml"

      - name: Restart services
        shell: bash
        env:
          API_IMAGE: ${{ needs.build-backend.outputs.api_image }}
          FRONTEND_IMAGE: ${{ needs.build-frontend.outputs.frontend_image }}
          SPEAKER_IMAGE: ${{ needs.build-speaker.outputs.speaker_image }}
          REPOSITORY: ${{ github.repository }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          repo="ghcr.io/${REPOSITORY,,}"
          SSH_OPTS=(-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null)
          {
            printf 'export DEPLOY_PATH=%q\n' "$DEPLOY_PATH"
            printf 'export API_IMAGE=%q\n' "$API_IMAGE"
            printf 'export FRONTEND_IMAGE=%q\n' "$FRONTEND_IMAGE"
            printf 'export SPEAKER_IMAGE=%q\n' "$SPEAKER_IMAGE"
            printf 'export DEFAULT_API_IMAGE=%q\n' "${repo}/api:main"
            printf 'export DEFAULT_FRONTEND_IMAGE=%q\n' "${repo}/frontend:main"
            printf 'export DEFAULT_SPEAKER_IMAGE=%q\n' "${repo}/speaker:main"
            printf 'export GHCR_USERNAME=%q\n' "$GHCR_USERNAME"
            printf 'export GHCR_TOKEN=%q\n' "$GHCR_TOKEN"
            cat <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          current_image() {
            docker inspect --format '{{.Config.Image}}' "$1" 2>/dev/null || true
          }

          dump_deploy_diagnostics() {
            echo "::group::Docker compose status"
            docker compose ps || true
            echo "::endgroup::"
            echo "::group::tobagent-api logs"
            docker logs --tail=200 tobagent-api || true
            echo "::endgroup::"
            echo "::group::speaker logs"
            docker logs --tail=120 tobagent-speaker || true
            echo "::endgroup::"
          }
          trap dump_deploy_diagnostics ERR

          if [ ! -s models/vad/ten-vad.onnx ]; then
            echo "Missing required VAD model: $DEPLOY_PATH/models/vad/ten-vad.onnx" >&2
            echo "Upload it once, for example: scp models/vad/ten-vad.onnx $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/models/vad/ten-vad.onnx" >&2
            exit 1
          fi

          kws_model_dir="models/kws/sherpa-onnx-kws-zipformer-zh-en-3M-2025-12-20"
          if [ ! -s "$kws_model_dir/tokens.txt" ] || [ ! -s "$kws_model_dir/encoder-epoch-13-avg-2-chunk-16-left-64.int8.onnx" ]; then
            echo "Missing required KWS model under $DEPLOY_PATH/$kws_model_dir" >&2
            echo "Upload it once, for example: scp -r models/kws $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/models/kws" >&2
            exit 1
          fi

          if [ -n "$GHCR_TOKEN" ]; then
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi

          api_image="${API_IMAGE:-$(current_image tobagent-api)}"
          frontend_image="${FRONTEND_IMAGE:-$(current_image tobagent-frontend)}"
          speaker_image="${SPEAKER_IMAGE:-$(current_image tobagent-speaker)}"
          api_image="${api_image:-$DEFAULT_API_IMAGE}"
          frontend_image="${frontend_image:-$DEFAULT_FRONTEND_IMAGE}"
          speaker_image="${speaker_image:-$DEFAULT_SPEAKER_IMAGE}"

          if [ -z "$api_image" ] || [ -z "$frontend_image" ] || [ -z "$speaker_image" ]; then
            echo "Cannot deploy because at least one skipped service has no running image to reuse." >&2
            echo "Run the workflow manually once to build all service images." >&2
            exit 1
          fi

          export TOBAGENT_IMAGE="$api_image"
          export TOBAGENT_FRONTEND_IMAGE="$frontend_image"
          export TOBAGENT_SPEAKER_IMAGE="$speaker_image"

          mkdir -p models/speechbrain
          docker compose pull tobagent frontend speaker
          docker compose up -d --remove-orphans
          docker image prune -f
          EOF
          } | ssh "${SSH_OPTS[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s
