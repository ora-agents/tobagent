name: Build and deploy

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build images
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.images.outputs.api_image }}
      frontend_image: ${{ steps.images.outputs.frontend_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: images
        shell: bash
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "api_image=${repo}/api:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${repo}/frontend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.images.outputs.api_image }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.images.outputs.frontend_image }}
          build-args: |
            NEXT_PUBLIC_OPENAI_DEFAULT_MODEL=${{ vars.NEXT_PUBLIC_OPENAI_DEFAULT_MODEL || 'qwen3.6-flash' }}
            NEXT_PUBLIC_LANGGRAPH_API_URL=${{ vars.NEXT_PUBLIC_LANGGRAPH_API_URL || 'http://121.41.50.105:2025' }}
            NEXT_PUBLIC_SHOW_MIC_DEVICE_DEBUG=${{ vars.NEXT_PUBLIC_SHOW_MIC_DEVICE_DEBUG }}
            NEXT_PUBLIC_ADMIN_URL=${{ vars.NEXT_PUBLIC_ADMIN_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync compose file
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}'"
          scp -i ~/.ssh/deploy_key docker-compose.yml \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/docker-compose.yml"

      - name: Restart services
        shell: bash
        env:
          API_IMAGE: ${{ needs.build.outputs.api_image }}
          FRONTEND_IMAGE: ${{ needs.build.outputs.frontend_image }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' API_IMAGE='${API_IMAGE}' FRONTEND_IMAGE='${FRONTEND_IMAGE}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          if [ -n "$GHCR_TOKEN" ]; then
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi

          export TOBAGENT_IMAGE="$API_IMAGE"
          export TOBAGENT_FRONTEND_IMAGE="$FRONTEND_IMAGE"

          docker compose pull tobagent frontend
          docker compose up -d --remove-orphans
          docker image prune -f
          EOF
