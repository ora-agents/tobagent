# Docker Compose - PostgreSQL + Redis + API
# aegra dev  -> docker compose up postgres -d  (database only, in-memory broker)
# aegra up   -> docker compose up --build      (full stack, Redis broker)

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: tobagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tobagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tobagent_secret}
      POSTGRES_DB: ${POSTGRES_DB:-tobagent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tobagent}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tobagent-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  tobagent:
    image: ${TOBAGENT_IMAGE:-tobagent-api:local}
    build: .
    container_name: tobagent-api
    restart: unless-stopped
    ports:
      - "${PORT:-2025}:${PORT:-2025}"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-tobagent}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tobagent_secret}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-tobagent}
      - AEGRA_CONFIG=aegra.json
      - AUTH_TYPE=${AUTH_TYPE:-noop}
      - PORT=${PORT:-2025}
      - REDIS_BROKER_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - SPEAKER_SERVICE_URL=http://speaker:8090
      - KWS_MODEL_DIR=/app/models/kws
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      speaker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${PORT:-2025}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./models/vad:/app/models/vad:ro
      - ./models/kws:/app/models/kws:rw

  speaker:
    image: ${TOBAGENT_SPEAKER_IMAGE:-tobagent-speaker:local}
    build:
      context: ./services/speaker
    container_name: tobagent-speaker
    restart: unless-stopped
    environment:
      - VOICE_SPEAKER_PROFILE_MODEL_SOURCE=/app/models/speechbrain-ecapa
      - VOICE_SPEAKER_PROFILE_MODEL_DIR=/app/models/speechbrain-ecapa
    volumes:
      - ./models/speechbrain-ecapa:/app/models/speechbrain-ecapa:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ${TOBAGENT_FRONTEND_IMAGE:-tobagent-frontend:local}
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_OPENAI_DEFAULT_MODEL=${OPENAI_COMPATIBLE_DEFAULT_MODEL:-qwen3.6-flash}
        - NEXT_PUBLIC_LANGGRAPH_API_URL=${FRONTEND_LANGGRAPH_API_URL:-http://localhost:2025}
        - NEXT_PUBLIC_SHOW_MIC_DEVICE_DEBUG=${NEXT_PUBLIC_SHOW_MIC_DEVICE_DEBUG:-}
        - NEXT_PUBLIC_ADMIN_URL=${NEXT_PUBLIC_ADMIN_URL:-}
    container_name: tobagent-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      tobagent:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
